<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wander — My Journeys</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css"
      rel="stylesheet"
    />
    <script>
      tailwind.config = { theme: { extend: {} } };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />

    <!-- 1. Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 2. Config (initializes client) -->
    <script src="js/config.js" defer></script>
    <!-- 3. Auth logic -->
    <script src="js/auth.js" defer></script>
    <!-- 4. Main logic (cursor, scroll, FAQ, lightbox, inquiry) -->
    <script src="js/main.js" defer></script>
    <!-- 5. Bookings logic -->
    <script src="js/bookings.js" defer></script>
  </head>
  <body
    style="
      background: linear-gradient(
        145deg,
        #080f0b 0%,
        #060d14 60%,
        #06111d 100%
      );
    "
  >
    <!-- Leaf Cursor -->
    <div id="leaf-cursor">
      <svg
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg"
        width="28"
        height="28"
      >
        <path
          d="M21 3C21 3 14 3 10 7C6 11 6 18 6 18C6 18 9.5 15.5 12.5 14.5C9.5 17.5 8.5 22 8.5 22L10.2 21.2C10.2 21.2 11.2 18 14 15.2C15.1 16.4 15.8 18.2 15.8 22L17.6 21.1C17.6 21.1 18.6 16.2 16.8 12.3C19.8 9.2 21 3 21 3Z"
          fill="#72cc87"
        />
      </svg>
    </div>

    <!-- Navbar -->
    <nav class="nav-container scrolled">
      <a href="index.html" class="wander-logo">Wander</a>
      <div class="nav-links">
        <a href="about.html" class="glass-btn hover-link">About</a>
        <a
          href="bookings.html"
          class="glass-btn hover-link"
          id="bookings-link"
          style="display: none"
          >Journeys</a
        >
        <span class="user-label" id="user-label" style="display: none"></span>
        <a class="glass-btn hover-link" id="auth-btn" href="auth.html"
          >Sign In</a
        >
        <a href="index.html" class="glass-btn forest-switcher hover-link"
          >&#x1F333; Forest</a
        >
      </div>
    </nav>

    <!-- Page Content -->
    <div
      class="inner-page default-inner"
      id="bookings-page"
      style="
        max-width: 860px;
        margin: 0 auto;
        padding-top: 120px;
        padding-bottom: 80px;
        padding-left: 52px;
        padding-right: 52px;
      "
    >
      <h1 class="page-title scroll-reveal">My Journeys</h1>
      <p class="page-sub scroll-reveal delay-1" id="booking-count">
        Loading...
      </p>

      <!-- Booking List -->
      <div id="bookings-list"></div>

      <!-- Empty State (hidden by default) -->
      <div id="empty-state" class="empty-state" style="display: none">
        <p class="empty-state-title">No journeys yet.</p>
        <p class="empty-state-text">
          Browse our destinations and book your first journey.
        </p>
        <div
          style="
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
          "
        >
          <a href="index.html" class="glass-btn forest-switcher"
            >&#x1F333; Sylvara Forest</a
          >
          <a href="ocean.html" class="glass-btn ocean-switcher"
            >&#x1F30A; Azurith Ocean</a
          >
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer
      class="site-footer"
      style="border-top: 1px solid rgba(255, 255, 255, 0.07)"
    >
      <span class="footer-text">&copy; 2026 Wander. All rights reserved.</span>
      <div style="display: flex; gap: 24px">
        <a href="about.html" class="footer-text hover-link">About</a>
        <a href="about.html#privacy" class="footer-text hover-link">Privacy</a>
      </div>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/bookings.js"></script>
    <script src="js/main.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // Redirect if not logged in
        if (!Auth.isLoggedIn()) {
          window.location.href =
            "auth.html?redirect=" + encodeURIComponent(window.location.href);
          return;
        }

        renderBookings();
      });

      function renderBookings() {
        const list = document.getElementById("bookings-list");
        const empty = document.getElementById("empty-state");
        const countEl = document.getElementById("booking-count");
        const bookings = Bookings.getAll();

        if (bookings.length === 0) {
          empty.style.display = "block";
          countEl.textContent = "You have no journeys booked.";
          return;
        }

        const noun = bookings.length === 1 ? "journey" : "journeys";
        countEl.textContent = `You have ${bookings.length} ${noun} booked.`;

        list.innerHTML = bookings
          .map(
            (b) => `
        <div class="booking-item glass scroll-reveal" id="booking-${b.id}">
          <div class="booking-left">
            <p class="booking-name">${escHtml(b.name)}</p>
            <p class="booking-meta">
              ${escHtml(b.destination)} &nbsp;&middot;&nbsp; ${escHtml(b.duration)}
              &nbsp;&middot;&nbsp; ${b.type === "Premium" ? "&#x2728; Premium" : "Standard"}
            </p>
            <p class="booking-meta" style="margin-top:4px;font-size:11px;opacity:0.6;">
              Booked on ${escHtml(b.bookedAt)}
            </p>
          </div>
          <div class="booking-right">
            <span class="booking-price">${escHtml(b.price)}</span>
            <button class="cancel-btn" onclick="handleCancel(${b.id})">Cancel</button>
          </div>
        </div>
      `,
          )
          .join("");

        // Trigger scroll reveal for dynamically added items
        setTimeout(() => {
          document
            .querySelectorAll(".scroll-reveal:not(.revealed)")
            .forEach((el) => {
              el.classList.add("revealed");
            });
        }, 80);
      }

      function handleCancel(id) {
        const itemEl = document.getElementById("booking-" + id);
        if (!confirm("Cancel this journey? This cannot be undone.")) return;

        if (itemEl) {
          itemEl.style.opacity = "0";
          itemEl.style.transform = "translateX(-20px)";
          itemEl.style.transition = "opacity 0.4s ease, transform 0.4s ease";
          setTimeout(() => {
            Bookings.cancel(id);
            renderBookings();
          }, 380);
        } else {
          Bookings.cancel(id);
          renderBookings();
        }
      }

      function escHtml(str) {
        const d = document.createElement("div");
        d.appendChild(document.createTextNode(String(str)));
        return d.innerHTML;
      }
    </script>
  </body>
</html>
